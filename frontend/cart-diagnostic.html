<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Diagnostic</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            background: white;
        }
        .success { border-left: 4px solid #4CAF50; }
        .error { border-left: 4px solid #f44336; }
        .warning { border-left: 4px solid #ff9800; }
        pre {
            background: #000;
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background: #0b7dda;
        }
    </style>
</head>
<body>
    <h1>🔍 Cart Diagnostic Page</h1>
    <p>This page will help diagnose cart issues.</p>
    
    <div id="results"></div>
    
    <h2>Manual Tests</h2>
    <button onclick="testCartManager()">Test CartManager</button>
    <button onclick="testAPI()">Test API</button>
    <button onclick="checkAuth()">Check Auth</button>
    
    <script src="auth.js"></script>
    <script src="cart-manager.js"></script>
    <script>
        const API_ENDPOINT = 'https://xox05733ce.execute-api.us-east-1.amazonaws.com/staging';
        const results = document.getElementById('results');
        
        function addResult(title, status, message, details = null) {
            const div = document.createElement('div');
            div.className = `status ${status}`;
            div.innerHTML = `
                <h3>${title}</h3>
                <p>${message}</p>
                ${details ? `<pre>${details}</pre>` : ''}
            `;
            results.appendChild(div);
        }
        
        // Run diagnostics on load
        window.addEventListener('DOMContentLoaded', () => {
            runDiagnostics();
        });
        
        async function runDiagnostics() {
            results.innerHTML = '<h2>Running Diagnostics...</h2>';
            
            // Test 1: Check if CartManager is loaded
            if (typeof CartManager !== 'undefined') {
                addResult(
                    '✅ CartManager Loaded',
                    'success',
                    'CartManager class is available'
                );
            } else {
                addResult(
                    '❌ CartManager Not Loaded',
                    'error',
                    'CartManager class is not defined. Check if cart-manager.js is loading.',
                    'Expected: typeof CartManager === "function"\nActual: typeof CartManager === "' + typeof CartManager + '"'
                );
                return; // Can't continue without CartManager
            }
            
            // Test 2: Initialize CartManager
            let cartManager;
            try {
                cartManager = new CartManager(API_ENDPOINT);
                addResult(
                    '✅ CartManager Initialized',
                    'success',
                    'CartManager instance created successfully'
                );
            } catch (error) {
                addResult(
                    '❌ CartManager Initialization Failed',
                    'error',
                    error.message,
                    error.stack
                );
                return;
            }
            
            // Test 3: Check authentication
            const isAuth = cartManager.isAuthenticated();
            addResult(
                isAuth ? '✅ User Authenticated' : '⚠️ User Not Authenticated',
                isAuth ? 'success' : 'warning',
                isAuth ? 'User is signed in' : 'User is not signed in (will use localStorage)',
                `window.authManager: ${typeof window.authManager}\nisAuthenticated: ${isAuth}`
            );
            
            // Test 4: Check cart state
            const cart = cartManager.getCart();
            const count = cartManager.getCartCount();
            addResult(
                '📊 Current Cart State',
                'success',
                `Cart has ${count} items`,
                JSON.stringify(cart, null, 2)
            );
            
            // Test 5: Test add to cart
            try {
                const testPostId = 'test-post-' + Date.now();
                await cartManager.addToCart(testPostId);
                addResult(
                    '✅ Add to Cart Works',
                    'success',
                    `Successfully added ${testPostId} to cart`
                );
                
                // Clean up
                await cartManager.removeFromCart(testPostId);
            } catch (error) {
                addResult(
                    '❌ Add to Cart Failed',
                    'error',
                    error.message,
                    error.stack
                );
            }
            
            // Test 6: Check localStorage
            const localCart = localStorage.getItem('euc_cart');
            if (localCart) {
                addResult(
                    '📦 localStorage Cart Found',
                    'success',
                    'Cart data exists in localStorage',
                    localCart
                );
            } else {
                addResult(
                    '⚠️ No localStorage Cart',
                    'warning',
                    'No cart data in localStorage (normal if authenticated)'
                );
            }
            
            // Test 7: Test API endpoint
            try {
                const response = await fetch(`${API_ENDPOINT}/posts`);
                if (response.ok) {
                    addResult(
                        '✅ API Endpoint Reachable',
                        'success',
                        `API endpoint ${API_ENDPOINT} is responding`
                    );
                } else {
                    addResult(
                        '❌ API Endpoint Error',
                        'error',
                        `API returned status ${response.status}`
                    );
                }
            } catch (error) {
                addResult(
                    '❌ API Endpoint Unreachable',
                    'error',
                    error.message
                );
            }
            
            addResult(
                '✅ Diagnostics Complete',
                'success',
                'All tests completed. Check results above.'
            );
        }
        
        function testCartManager() {
            if (typeof CartManager === 'undefined') {
                alert('CartManager not loaded!');
                return;
            }
            
            const cm = new CartManager(API_ENDPOINT);
            console.log('CartManager:', cm);
            console.log('Cart:', cm.getCart());
            console.log('Count:', cm.getCartCount());
            alert('Check console for CartManager details');
        }
        
        async function testAPI() {
            try {
                const response = await fetch(`${API_ENDPOINT}/posts`);
                const data = await response.json();
                console.log('API Response:', data);
                alert('API test successful! Check console for details.');
            } catch (error) {
                console.error('API Error:', error);
                alert('API test failed: ' + error.message);
            }
        }
        
        function checkAuth() {
            console.log('window.authManager:', window.authManager);
            if (window.authManager) {
                console.log('isAuthenticated:', window.authManager.isAuthenticated());
                console.log('user:', window.authManager.getUser());
            }
            alert('Check console for auth details');
        }
    </script>
</body>
</html>
